<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Translation Notes</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fafafa;
      color: #111;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .note {
      margin-bottom: 20px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    a {
      color: #0077cc;
    }
  </style>
</head>

<body>

<header>
  <h1>hungarian Translation Notes</h1>
</header>

<div class="container">
  
  <div class="note">
    <div class="title">「あんたなんか人間じゃない」の訳</div>
    <p>
      Te nem is vagy ember.<br>
      Te = あなた（親しい or 強い言い方）<br>
      nem = 否定（〜ない）<br>
      is = 「〜さえ」「〜すら」→ここでは強調<br>
      vagy = 「〜である」（be動詞）<br>
      ember = 人間<br>
    </p>
  </div>

  <a href="index.html">← Home</a>

</div>

</body>
</html>
