  <div class="note">
    <div class="title">「あんたなんか人間じゃない」の訳</div>
    <p>
      「あんたなんか人間じゃない」はイタリア語だと、ニュアンスによって少し変わるけど、ストレートに言うなら：<br>
      「Non sei nemmeno umano.」（直訳：お前は人間ですらない）<br>
      Non = 否定「〜ない」<br>
      sei = 「あなたは〜である」（動詞 essere の2人称単数）<br>
      nemmeno = 「〜ですらない／〜さえもない」<br>
      umano = 「人間の／人間」<br>
      Tuを入れると喧嘩腰になってしまう<br>
    </p>
