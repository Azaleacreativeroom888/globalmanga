<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Translation Notes</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fafafa;
      color: #111;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .note {
      margin-bottom: 20px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    a {
      color: #0077cc;
    }
  </style>
</head>

<body>

<header>
  <h1>Finnish Translation Notes</h1>
</header>

<div class="container">

  <div class="note">
    <div class="title">「借金作ってなにしてるの？」の訳</div>
    <p>
      Miksi ihmeessä olet velkaantunut?（直訳：なんでまた借金なんて背負ったの？）<br>
      Miksi = なぜ<br>
      ihmeessä = いったい / なんでまた<br>
      velkaantunut = 借金を背負った<br>
    </p>
  </div>
  
  <div class="note">
    <div class="title">「あんたなんか人間じゃない」の訳</div>
    <p>
      Et ole edes ihminen.<br>
      Et ole = あなたは〜ではない<br>
      edes = さえ〜ない（強調）<br>
      ihminen = 人間<br>
    </p>
  </div>

  <a href="index.html">← Home</a>

</div>

</body>
</html>
