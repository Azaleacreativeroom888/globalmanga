<body>

<header>
  <h1>Portuguese Translation Notes</h1>
</header>

<div class="container">
  
  <div class="note">
    <div class="title">「あんたなんか人間じゃない」の訳</div>
    <p>
      Você nem é humano.<br>
      Você：あなた<br>
      nem：〜さえない（強い否定・「〜ですらない」）<br>
      é：「〜である」（ser動詞）<br>
      humano：人間<br>
      男性に言うなら：humain<br>
    </p>
  </div>

  <a href="index.html">← Home</a>

</div>
